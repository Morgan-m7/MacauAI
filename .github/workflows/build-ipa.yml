name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build iOS App
        run: |
          cd iOSApp
          xcodebuild -project WebViewApp.xcodeproj \
                     -scheme MacauAI \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     ARCHS=arm64 \
                     clean build

      - name: Package IPA
        run: |
          APP_DIR=iOSApp/build/Build/Products/Release-iphoneos/MacauAI.app
          mkdir -p Payload/MacauAI.app
          cp -r ""/* Payload/MacauAI.app/
          cp iOSApp/index.html Payload/MacauAI.app/
          zip -r MacauAI.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MacauAI.ipa
          path: MacauAI.ipa