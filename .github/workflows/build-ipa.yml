name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS App
        run: |
          cd iOSApp
          xcodebuild -project WebViewApp.xcodeproj \
                     -target MacauAI \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     ARCHS=arm64 \
                     clean build

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_DIR=$(find iOSApp/build -name "*.app" -type d | head -1)
          cp -r "$APP_DIR" Payload/MacauAI.app
          cp iOSApp/index.html Payload/MacauAI.app/
          zip -r MacauAI.ipa Payload/ -x "*.DS_Store"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MacauAI.ipa
          path: MacauAI.ipa